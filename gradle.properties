group = jp.ac.nitech.cc.hop.verifier
version = 1.0.0
pluginId = jp.ac.nitech.cc.hop.assistant
pluginName = Hop Migration Assistant
pluginVendor = Yasuhiro Ohzone / Nitech
pluginDescription = Real-time validation and one-click generation (Quick Fix) for Apache Hop 2.x plugin constructors. prevent NoSuchMethodException at compile time!

pluginRepositoryUrl = https://github.com/yasuoz/hop-migration-assistant

# Opt-out flag for bundling Kotlin standard library -> https://jb.gg/intellij-platform-kotlin-stdlib
kotlin.stdlib.default.dependency = false

# Enable Gradle Configuration Cache -> https://docs.gradle.org/current/userguide/configuration_cache.html
org.gradle.configuration-cache = true

# Enable Gradle Build Cache -> https://docs.gradle.org/current/userguide/build_cache.html
org.gradle.caching = true
